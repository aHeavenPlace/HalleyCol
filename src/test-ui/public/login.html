<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HalleyCol CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <img src="/img/logo.png" alt="HalleyCol Logo" class="login-logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="login-logo-placeholder" style="display:none;">👟</div>
            <h1 class="login-title">Panel de Control - HalleyCol</h1>
            <p class="login-subtitle">Sistema Integral: Chatbot WhatsApp + App CRM</p>

            <div id="loginError" class="login-error"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required
                        autocomplete="current-password">
                </div>
                <button type="submit" id="loginBtn">
                    Iniciar Sesión →
                </button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Si ya está logueado, redirigir al dashboard
        if (HalleyCol.auth.isLoggedIn()) {
            const user = HalleyCol.auth.getCurrentUser();
            window.location.href = '/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            // Mostrar loading
            loginBtn.disabled = true;
            loginBtn.textContent = 'Iniciando sesión...';
            errorDiv.style.display = 'none';

            // Intentar login
            const result = await HalleyCol.auth.login(username, password);

            if (result.success) {
                // Redirigir según el rol a su dashboard específico
                const redirectPaths = {
                    'admin': '/dashboard',
                    'ventas': '/dashboard',
                    'logistica': '/dashboard-logistica',
                    'asesor': '/dashboard-asesor',
                };
                const user = HalleyCol.auth.getCurrentUser();
                window.location.href = redirectPaths[user.role] || '/dashboard';
            } else {
                // Mostrar error
                errorDiv.textContent = result.error;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión →';
            }
        });
    </script>
</body>

</html>
